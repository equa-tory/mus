<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="theme-color" content="#15120e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Library</title>
<style>
  /* ---- tokens: warm near-black room, single amber accent ---- */
  :root{
    --bg:#15120e; --bg2:#1d1813; --bg3:#262019; --line:#2e2820;
    --text:#efe7d8; --muted:#9b8e7a; --muted2:#6f6557;
    --accent:#e0a85b; --accent-dim:#b9863f;
    --bar-h:64px; --safe:env(safe-area-inset-bottom,0px);
    --ease:cubic-bezier(.22,.61,.36,1);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:var(--bg); color:var(--text); overflow:hidden;
    font:15px/1.4 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,system-ui,sans-serif;
    -webkit-font-smoothing:antialiased; font-variant-numeric:tabular-nums;
    -webkit-tap-highlight-color:transparent;
  }
  button{font:inherit;color:inherit;background:none;border:0;cursor:pointer}
  img{display:block}
  .num{font-variant-numeric:tabular-nums}

  /* ---- header ---- */
  header{
    position:sticky;top:0;z-index:20;display:flex;gap:10px;align-items:center;
    padding:14px 16px 10px;background:linear-gradient(var(--bg),var(--bg) 70%,transparent);
  }
  .brand{display:flex;align-items:center;gap:9px;font-weight:600;letter-spacing:.2px;white-space:nowrap}
  .brand .mark{width:11px;height:20px;border-radius:2px;background:var(--accent);box-shadow:7px 0 0 -3px var(--accent-dim)}
  #search{
    flex:1;min-width:0;background:var(--bg2);border:1px solid var(--line);color:var(--text);
    border-radius:10px;padding:9px 12px;font-size:14px;outline:none;
  }
  #search:focus{border-color:var(--accent-dim)}
  #search::placeholder{color:var(--muted2)}
  #scanBtn{
    white-space:nowrap;border:1px solid var(--line);background:var(--bg2);color:var(--muted);
    padding:9px 12px;border-radius:10px;font-size:13px;
  }
  #scanBtn:hover{color:var(--text);border-color:var(--accent-dim)}

  /* ---- tabs ---- */
  nav{position:sticky;top:0;z-index:19;display:flex;gap:4px;padding:0 12px 10px;
    overflow-x:auto;scrollbar-width:none;background:var(--bg)}
  nav::-webkit-scrollbar{display:none}
  nav button{white-space:nowrap;color:var(--muted);padding:7px 12px;border-radius:8px;font-size:13.5px}
  nav button.active{color:var(--bg);background:var(--accent);font-weight:600}
  nav button:not(.active):hover{color:var(--text);background:var(--bg2)}

  /* ---- list ---- */
  main{position:absolute;inset:0;top:104px;overflow-y:auto;overflow-x:hidden;
    padding:2px 8px calc(var(--bar-h) + var(--safe) + 20px);overscroll-behavior:contain}
  .section-title{padding:14px 10px 6px;color:var(--muted);font-size:12px;letter-spacing:.6px;text-transform:uppercase}
  .row{
    display:grid;grid-template-columns:44px 1fr auto auto auto;align-items:center;gap:12px;
    padding:7px 8px;border-radius:10px;content-visibility:auto;contain-intrinsic-size:58px;
  }
  .row:hover{background:var(--bg2)}
  .row .art{width:44px;height:44px;border-radius:6px;background:var(--bg3);position:relative;overflow:hidden;flex:none}
  .row .art img{width:100%;height:100%;object-fit:cover}
  .row .art .ph{position:absolute;inset:0;display:grid;place-items:center;color:var(--muted2);font-size:18px}
  .row .meta{min-width:0}
  .row .t{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .row .s{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--muted);font-size:13px;margin-top:1px}
  .row.playing .t{color:var(--accent)}
  .row .like{font-size:15px;color:var(--muted2);width:26px;text-align:center;opacity:0;transition:opacity .15s}
  .row:hover .like,.row .like.on{opacity:1}
  .row .like.on{color:var(--accent)}
  .row .end{color:var(--muted);font-size:13px;min-width:38px;text-align:right}
  .row .more{color:var(--muted2);font-size:18px;width:26px;opacity:0;transition:opacity .15s;line-height:1}
  .row:hover .more{opacity:1}
  .pl-count{color:var(--muted2);font-size:12px;margin-left:6px}

  .eq{display:inline-flex;gap:2px;height:13px;align-items:flex-end;vertical-align:middle}
  .eq i{width:3px;background:var(--accent);height:40%;border-radius:1px;animation:eq .9s var(--ease) infinite}
  .eq i:nth-child(2){animation-delay:.25s}.eq i:nth-child(3){animation-delay:.5s}
  @keyframes eq{0%,100%{height:25%}50%{height:100%}}

  /* ---- empty / index cards ---- */
  .empty{display:grid;place-items:center;gap:14px;text-align:center;color:var(--muted);
    min-height:60vh;padding:30px}
  .empty h2{color:var(--text);font-weight:600;margin:0}
  .btn{border:1px solid var(--line);background:var(--bg2);padding:10px 16px;border-radius:10px;color:var(--text)}
  .btn:hover{border-color:var(--accent-dim)}
  .btn.accent{background:var(--accent);color:var(--bg);border-color:var(--accent);font-weight:600}
  .pl-index{display:flex;flex-wrap:wrap;gap:10px;padding:8px 8px 0}
  .pl-card{background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:14px;
    width:calc(50% - 5px);cursor:pointer}
  .pl-card:hover{border-color:var(--accent-dim)}
  .pl-card .nm{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .pl-card .sub{color:var(--muted);font-size:12.5px;margin-top:3px}
  .pl-tools{display:flex;gap:8px;padding:12px 8px 4px}
  .backrow{display:flex;align-items:center;gap:10px;padding:10px;color:var(--muted)}
  .backrow:hover{color:var(--text)}

  /* ---- player: collapsed bar ---- */
  #player{position:fixed;left:0;right:0;bottom:0;z-index:30}
  #player.hidden{display:none}
  #bar{
    height:var(--bar-h);margin:0 8px;margin-bottom:calc(var(--safe) + 8px);
    background:var(--bg2);border:1px solid var(--line);border-radius:14px;
    display:grid;grid-template-columns:46px 1fr auto auto auto;align-items:center;gap:8px;padding:0 8px 0 9px;
    box-shadow:0 10px 30px rgba(0,0,0,.45);cursor:pointer;
  }
  #bar .progress{position:absolute;left:14px;right:14px;bottom:6px;height:2px;background:var(--line);border-radius:2px;overflow:hidden}
  #bar .progress i{display:block;height:100%;width:0;background:var(--accent)}
  #barArt{width:46px;height:46px;border-radius:8px;object-fit:cover;background:var(--bg3)}
  #barMeta{min-width:0}
  #barTitle{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500;font-size:14px}
  #barArtist{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--muted);font-size:12.5px}
  #bar .ctrl{display:flex;align-items:center;gap:2px}
  #bar .ctrl button{width:40px;height:40px;display:grid;place-items:center;border-radius:50%;font-size:17px}
  #bar .ctrl button:hover{background:var(--bg3)}

  /* ---- player: expanded sheet ---- */
  #sheet{position:fixed;inset:0;z-index:40;background:var(--bg);transform:translateY(100%);
    transition:transform .38s var(--ease);overflow:hidden;display:flex;flex-direction:column}
  #sheet.open{transform:translateY(0)}
  #sheetBg{position:absolute;inset:-10%;width:120%;height:120%;object-fit:cover;
    filter:blur(46px) brightness(.42) saturate(1.15);transform:scale(1.1);opacity:.55;transition:opacity .4s}
  #sheet .veil{position:absolute;inset:0;background:linear-gradient(rgba(21,18,14,.55),rgba(21,18,14,.4) 30%,rgba(21,18,14,.9))}
  #sheet .inner{position:relative;z-index:1;display:flex;flex-direction:column;height:100%;
    padding:calc(env(safe-area-inset-top,0px) + 14px) 24px calc(var(--safe) + 22px);
    max-width:560px;margin:0 auto;width:100%}
  .sheet-top{display:flex;align-items:center;justify-content:space-between}
  .sheet-top button{width:44px;height:44px;display:grid;place-items:center;border-radius:50%;color:var(--muted);font-size:20px}
  .sheet-top button:hover{background:var(--bg2);color:var(--text)}
  .sheet-top .label{color:var(--muted);font-size:12px;letter-spacing:.6px;text-transform:uppercase}
  #sheetArtWrap{flex:1;display:grid;place-items:center;padding:18px 0;min-height:0}
  #sheetArt{width:min(72vw,330px);aspect-ratio:1;border-radius:16px;object-fit:cover;background:var(--bg3);
    box-shadow:0 24px 60px rgba(0,0,0,.55)}
  .np-meta{margin:4px 0 10px}
  #npTitle{font-size:23px;font-weight:600;letter-spacing:-.2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  #npArtist{color:var(--muted);font-size:15px;margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  #npLike{font-size:22px;color:var(--muted);flex:none}
  #npLike.on{color:var(--accent)}
  .seek{display:flex;flex-direction:column;gap:6px;margin:6px 0 4px}
  .seek .times{display:flex;justify-content:space-between;color:var(--muted);font-size:12px}
  .transport{display:flex;align-items:center;justify-content:space-between;margin:14px 4px 6px}
  .transport button{color:var(--text);display:grid;place-items:center}
  .transport .sec{width:46px;height:46px;font-size:18px;color:var(--muted)}
  .transport .sec:hover{color:var(--text)}
  .transport .sec.on{color:var(--accent)}
  .transport .skip{width:54px;height:54px;font-size:24px}
  #npPlay{width:70px;height:70px;border-radius:50%;background:var(--accent);color:var(--bg);font-size:27px;
    display:grid;place-items:center;box-shadow:0 8px 24px rgba(224,168,91,.35)}
  #npPlay:active{transform:scale(.96)}
  .vol{display:flex;align-items:center;gap:12px;color:var(--muted);margin:16px 2px 2px}
  .vol span{font-size:16px}
  .actions{display:flex;gap:10px;margin-top:18px}
  .actions .btn{flex:1;text-align:center;font-size:14px;padding:11px}

  /* range inputs */
  input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:22px;background:transparent;cursor:pointer}
  input[type=range]::-webkit-slider-runnable-track{height:4px;border-radius:3px;
    background:linear-gradient(var(--accent),var(--accent)) no-repeat,var(--line);
    background-size:var(--fill,0%) 100%}
  input[type=range]::-moz-range-track{height:4px;border-radius:3px;background:var(--line)}
  input[type=range]::-moz-range-progress{height:4px;border-radius:3px;background:var(--accent)}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;
    background:var(--text);margin-top:-5px;box-shadow:0 1px 4px rgba(0,0,0,.5)}
  input[type=range]::-moz-range-thumb{width:14px;height:14px;border:0;border-radius:50%;background:var(--text)}

  /* slide-up panels inside sheet (queue / sleep) */
  .panel{position:absolute;left:0;right:0;bottom:0;z-index:2;background:var(--bg2);border-top:1px solid var(--line);
    border-radius:18px 18px 0 0;transform:translateY(101%);transition:transform .3s var(--ease);
    max-height:72%;display:flex;flex-direction:column;box-shadow:0 -10px 40px rgba(0,0,0,.5)}
  .panel.open{transform:translateY(0)}
  .panel .phead{display:flex;align-items:center;justify-content:space-between;padding:16px 18px 10px}
  .panel .phead b{font-size:15px}
  .panel .phead button{color:var(--muted);font-size:14px}
  .panel .pbody{overflow-y:auto;padding:0 10px calc(var(--safe) + 16px)}
  .qitem{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;padding:9px 10px;border-radius:9px}
  .qitem:hover{background:var(--bg3)}
  .qitem.cur .qt{color:var(--accent)}
  .qt{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .qs{color:var(--muted);font-size:12.5px}
  .qx{color:var(--muted2);font-size:16px;padding:4px}
  .sleep-opt{display:flex;justify-content:space-between;align-items:center;padding:13px 12px;border-radius:9px}
  .sleep-opt:hover{background:var(--bg3)}
  .sleep-opt.on{color:var(--accent)}

  /* context menu + dialogs */
  .menu{position:fixed;z-index:60;background:var(--bg2);border:1px solid var(--line);border-radius:12px;
    padding:6px;min-width:190px;box-shadow:0 16px 44px rgba(0,0,0,.55)}
  .menu button{display:block;width:100%;text-align:left;padding:9px 11px;border-radius:8px;font-size:14px}
  .menu button:hover{background:var(--bg3)}
  .menu .sep{height:1px;background:var(--line);margin:5px 2px}
  .menu .mlabel{padding:7px 11px 4px;color:var(--muted2);font-size:11px;text-transform:uppercase;letter-spacing:.5px}
  .scrim{position:fixed;inset:0;z-index:55}

  .modal{position:fixed;inset:0;z-index:70;display:grid;place-items:center;background:rgba(0,0,0,.55);padding:20px}
  .card{background:var(--bg2);border:1px solid var(--line);border-radius:16px;padding:20px;width:100%;max-width:420px}
  .card h3{margin:0 0 14px;font-size:16px}
  .card input,.card select{width:100%;background:var(--bg);border:1px solid var(--line);color:var(--text);
    border-radius:9px;padding:9px 11px;font-size:14px;outline:none}
  .card input:focus,.card select:focus{border-color:var(--accent-dim)}
  .field{margin-bottom:12px}
  .field label{display:block;color:var(--muted);font-size:12px;margin-bottom:5px}
  .cond{display:grid;grid-template-columns:1fr 1fr 1.2fr auto;gap:6px;margin-bottom:8px;align-items:center}
  .cond .rm{color:var(--muted2);font-size:18px;padding:0 4px}
  .card-foot{display:flex;justify-content:flex-end;gap:10px;margin-top:16px}
  .toggle-line{display:flex;gap:8px;align-items:center;color:var(--muted);font-size:13px;margin-bottom:12px}

  #toast{position:fixed;left:50%;bottom:calc(var(--bar-h) + var(--safe) + 26px);transform:translateX(-50%) translateY(20px);
    background:var(--bg3);border:1px solid var(--line);color:var(--text);padding:10px 16px;border-radius:11px;
    font-size:13.5px;z-index:80;opacity:0;pointer-events:none;transition:.25s var(--ease);box-shadow:0 10px 30px rgba(0,0,0,.5)}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  /* brand clickable */
  .brand{cursor:pointer;user-select:none;-webkit-user-select:none}
  .brand:active .mark{opacity:.7}

  /* swipe handle on expanded sheet */
  .sheet-handle{width:40px;height:4px;border-radius:2px;
    background:rgba(255,255,255,.18);margin:0 auto 10px;flex:none}

  /* view-bar: shuffle-play + track count */
  .view-bar{display:flex;align-items:center;justify-content:space-between;
    padding:4px 10px 10px}
  .btn-random{display:flex;align-items:center;gap:7px;background:var(--bg2);
    border:1px solid var(--line);color:var(--text);border-radius:9px;
    padding:8px 14px;font-size:13.5px;font:inherit}
  .btn-random:hover{border-color:var(--accent-dim)}
  .btn-random:active{opacity:.75}
  .view-count{color:var(--muted);font-size:12.5px}

  /* crossfade row */
  .xfade{display:flex;align-items:center;gap:12px;color:var(--muted);margin:10px 2px 2px}
  .xfade #xfadeLabel{font-size:13px;min-width:96px;white-space:nowrap}

  @media (max-width:420px){
    .pl-card{width:100%}
    .brand span{display:none}
    header{padding:10px 10px 8px;gap:8px}
    #search{padding:8px 10px}
    #scanBtn{padding:8px 10px}
    .transport .sec{width:42px;height:42px}
    .transport .skip{width:50px;height:50px}
    #npPlay{width:64px;height:64px;font-size:24px}
    #sheetArtWrap{padding:10px 0}
    #sheet .inner{padding:calc(env(safe-area-inset-top,0px) + 4px) 18px calc(var(--safe) + 18px)}
  }

  /* ---- mini-bar extras ---- */
  #barLike{font-size:16px;color:var(--muted2);width:32px;height:40px;display:grid;place-items:center;border-radius:8px;flex:none}
  #barLike:hover{color:var(--text);background:var(--bg3)}
  #barLike.on{color:var(--accent)}
  .bar-vol{width:76px;cursor:pointer;-webkit-appearance:none;appearance:none;height:22px;background:transparent}
  .bar-vol::-webkit-slider-runnable-track{height:3px;border-radius:2px;background:linear-gradient(var(--accent),var(--accent)) no-repeat,var(--line);background-size:var(--fill,0%) 100%}
  .bar-vol::-moz-range-track{height:3px;border-radius:2px;background:var(--line)}
  .bar-vol::-moz-range-progress{height:3px;border-radius:2px;background:var(--accent)}
  .bar-vol::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:var(--text);margin-top:-4.5px;box-shadow:0 1px 3px rgba(0,0,0,.4)}
  .bar-vol::-moz-range-thumb{width:12px;height:12px;border:0;border-radius:50%;background:var(--text)}
  @media(max-width:640px){.bar-vol{display:none}}
</style>
</head>
<body>
  <header>
    <div class="brand"><i class="mark"></i><span>Library</span></div>
    <input id="search" type="search" placeholder="Search title, artist, album" autocomplete="off">
    <button id="scanBtn">Scan</button>
  </header>
  <nav id="tabs"></nav>
  <main id="list"></main>

  <section id="player" class="hidden">
    <div id="bar">
      <img id="barArt" alt="">
      <div id="barMeta"><div id="barTitle"></div><div id="barArtist"></div></div>
      <button id="barLike" title="Like">♡</button>
      <input id="barVol" class="bar-vol" type="range" min="0" max="100" value="90">
      <div class="ctrl">
        <button id="barPrev" title="Previous">⏮</button>
        <button id="barPlay" title="Play">▶</button>
        <button id="barNext" title="Next">⏭</button>
      </div>
      <div class="progress"><i id="barFill"></i></div>
    </div>

    <div id="sheet">
      <img id="sheetBg" alt="">
      <div class="veil"></div>
      <div class="inner">
        <div class="sheet-handle"></div>
        <div class="sheet-top">
          <button id="collapse" title="Close">⌄</button>
          <span class="label" id="sheetLabel">Now playing</span>
          <button id="npLike" title="Like">♡</button>
        </div>
        <div id="sheetArtWrap"><img id="sheetArt" alt=""></div>
        <div class="np-meta">
          <div id="npTitle"></div>
          <div id="npArtist"></div>
        </div>
        <div class="seek">
          <input id="seek" type="range" min="0" max="1000" value="0">
          <div class="times"><span id="tCur">0:00</span><span id="tDur">0:00</span></div>
        </div>
        <div class="transport">
          <button class="sec" id="shuffle" title="Shuffle">⤮</button>
          <button class="skip" id="prev" title="Previous">⏮</button>
          <button id="npPlay" title="Play">▶</button>
          <button class="skip" id="next" title="Next">⏭</button>
          <button class="sec" id="repeat" title="Repeat">↻</button>
        </div>
        <div class="vol">
          <span>🔈</span>
          <input id="vol" type="range" min="0" max="100" value="90">
        </div>
        <div class="xfade">
          <span id="xfadeLabel">Crossfade · 4s</span>
          <input id="xfade" type="range" min="0" max="30" value="4">
        </div>
        <div class="actions">
          <button class="btn" id="openQueue">Queue</button>
          <button class="btn" id="openSleep">Sleep timer</button>
        </div>

        <div class="panel" id="queuePanel">
          <div class="phead"><b>Queue</b><button id="closeQueue">Done</button></div>
          <div class="pbody" id="queueBody"></div>
        </div>
        <div class="panel" id="sleepPanel">
          <div class="phead"><b>Sleep timer</b><button id="closeSleep">Done</button></div>
          <div class="pbody" id="sleepBody"></div>
        </div>
      </div>
    </div>
  </section>

  <div id="toast"></div>

<script>
(() => {
"use strict";
const $ = s => document.querySelector(s);
const el = (t,c) => { const e=document.createElement(t); if(c) e.className=c; return e; };
const fmt = s => { if(!isFinite(s)||s<0) s=0; s=Math.floor(s); return Math.floor(s/60)+":"+String(s%60).padStart(2,"0"); };

// ---- state ----
const S = {
  byId:new Map(), allIds:[], view:"library", openPlaylist:null,
  search:"", listIds:[], historyIds:[],
  queue:[], order:[], pos:0, shuffle:false, repeat:"off",
  volume:0.9, crossfade:4, playing:false,
  sleep:null, _xfading:false, _counted:false, _seeking:false,
  playlists:[],
};
const TABS = [["library","Library"],["recent","Recently added"],["liked","Liked"],
              ["most","Most played"],["history","History"],["playlists","Playlists"]];
const FADE = 0.6;
const SILENT = "data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=";

// ---- two persistent <audio> elements: this is the whole trick ----
// A single long-lived audio context (these elements) survives every track
// change, so the browser's autoplay unlock persists and we can both crossfade
// and skip forward programmatically without it ever being blocked.
const aud = [new Audio(), new Audio()];
let ai = 0;
const cur = () => aud[ai];
const oth = () => aud[ai^1];
aud.forEach(a => { a.preload="auto"; a.volume=S.volume;
  a.addEventListener("timeupdate", onTime);
  a.addEventListener("ended", onEnded);
  a.addEventListener("loadedmetadata", e=>{ if(e.target===cur()) drawTimes(); });
});

// unlock both elements on the first user gesture (so the 2nd one can autoplay later)
// We use a throw-away Audio element for the gesture; autoplay permission is per
// browsing context, so one play() unlocks everything on the page — no need to
// set muted=true on the main aud[] elements (that was causing silent playback on PC).
let unlocked=false;
function unlock(){
  if(unlocked) return; unlocked=true;
  const tmp=new Audio(SILENT);
  const p=tmp.play(); if(p&&p.catch) p.catch(()=>{});
}
addEventListener("pointerdown", unlock, {once:true});
addEventListener("keydown", unlock, {once:true});

// ---- volume fades (per-element token cancels stale fades) ----
function fade(a, to, dur, done){
  const tok = (a._ft=(a._ft||0)+1), from=a.volume, t0=performance.now();
  if(dur<=0){ a.volume=to; done&&done(); return; }
  (function step(now){
    if(a._ft!==tok) return;
    const k=Math.min(1,(now-t0)/(dur*1000));
    a.volume=from+(to-from)*k;
    k<1 ? requestAnimationFrame(step) : (done&&done());
  })(performance.now());
}
function crossfade(out,inn,dur,done){
  fade(inn,S.volume,dur);
  fade(out,0,dur,()=>{ try{out.pause();}catch(e){} out.currentTime=0; out.volume=S.volume; });
  setTimeout(()=>done&&done(), Math.max(0,dur*1000)+40);
}

// ---- view list ----
function matches(t){
  const q=S.search.trim().toLowerCase(); if(!q) return true;
  return (t.title+" "+t.artist+" "+t.album).toLowerCase().includes(q);
}
function smartIds(rules){
  const cs=rules.conditions||[], m=rules.match||"all";
  const test=(t,c)=>{
    if(c.field==="liked") return c.op==="true"?!!t.liked:!t.liked;
    if(c.field==="playCount"){ const n=+c.value||0; return c.op==="gte"?t.playCount>=n:t.playCount<=n; }
    const f=(t[c.field]||"").toLowerCase(), v=(c.value||"").toLowerCase();
    if(c.op==="contains") return f.includes(v);
    if(c.op==="is") return f===v;
    if(c.op==="isNot") return f!==v;
    return true;
  };
  return S.allIds.filter(id=>{ const t=tr(id), res=cs.map(c=>test(t,c));
    return m==="all"?res.every(Boolean):res.some(Boolean); });
}
function viewIds(){
  let ids;
  switch(S.view){
    case "recent": ids=[...S.allIds].sort((a,b)=>(tr(b).addedAt||0)-(tr(a).addedAt||0)); break;
    case "liked":  ids=S.allIds.filter(id=>tr(id).liked); break;
    case "most":   ids=S.allIds.filter(id=>tr(id).playCount>0)
                      .sort((a,b)=>tr(b).playCount-tr(a).playCount); break;
    case "history":ids=S.historyIds.slice(); break;
    case "playlist":{
      const p=S.openPlaylist;
      ids = p.isSmart ? smartIds(p.rules||{}) : (p.trackIds||[]).filter(id=>S.byId.has(id));
      break;
    }
    default: ids=[...S.allIds];
  }
  return S.search.trim() ? ids.filter(id=>matches(tr(id))) : ids;
}

// ---- queue / order ----
function currentId(){ return S.queue.length ? S.queue[S.order[S.pos]] : null; }
function buildOrder(start){
  const idx=[...S.queue.keys()];
  if(S.shuffle){ for(let i=idx.length-1;i>0;i--){ const j=Math.random()*(i+1)|0; [idx[i],idx[j]]=[idx[j],idx[i]]; }
    const k=idx.indexOf(start); if(k>0){ idx.splice(k,1); idx.unshift(start); } S.order=idx; S.pos=0; }
  else { S.order=idx; S.pos=start; }
}
function peekNext(){           // id of next track or null, advancing pos only if real
  if(!S.queue.length) return null;
  if(S.repeat==="one") return currentId();
  if(S.pos < S.order.length-1){ S.pos++; return currentId(); }
  if(S.repeat==="all"){ S.pos=0; return currentId(); }
  return null;
}

// ---- playback ----
function showPlayer(){ $("#player").classList.remove("hidden"); }
function playFrom(ids,i){
  S.queue=ids.slice(); buildOrder(i);
  showPlayer(); transitionTo(currentId(), FADE);
}
// shuffle-play the given id list from a random position (enables shuffle)
function shufflePlay(ids){
  if(!ids.length) return;
  S.shuffle=true; $("#shuffle").classList.add("on");
  playFrom(ids, Math.floor(Math.random()*ids.length));
  persist();
}
let _tEpoch=0;
function transitionTo(id, dur){
  if(id==null) return;
  const inn=oth();
  inn.src="api/stream/"+id; inn.currentTime=0; inn.volume=0;
  const p=inn.play(); if(p&&p.catch) p.catch(()=>{});
  crossfade(cur(), inn, dur);
  ai^=1;
  S.playing=true; S._counted=false; S._xfading=false;
  onTrackChanged(id);
  // Safety: if the rAF volume-fade was interrupted (tab hidden, etc.) self-correct
  const ep=++_tEpoch;
  setTimeout(()=>{ if(_tEpoch!==ep||!S.playing) return;
    const a=cur(); if(a.volume<S.volume*0.8){a._ft=(a._ft||0)+1;a.volume=S.volume;} },
    Math.max(dur,0.1)*1000+500);
}
function onTrackChanged(id){
  const t=tr(id); if(!t) return;
  const artUrl = t.hasArt ? "api/art/"+id : "";
  $("#barTitle").textContent=t.title; $("#barArtist").textContent=t.artist;
  $("#npTitle").textContent=t.title; $("#npArtist").textContent=t.artist+(t.album?" · "+t.album:"");
  setArt($("#barArt"),artUrl); setArt($("#sheetArt"),artUrl); setArt($("#sheetBg"),artUrl);
  const liked=!!t.liked;
  $("#npLike").textContent=liked?"♥":"♡"; $("#npLike").classList.toggle("on",liked);
  $("#barLike").textContent=liked?"♥":"♡"; $("#barLike").classList.toggle("on",liked);
  drawTimes(); updatePlay(); markPlayingRow(id); renderQueue(); persist(); syncState();
  // media session for lock-screen / TV controls
  if("mediaSession" in navigator){
    navigator.mediaSession.metadata=new MediaMetadata({title:t.title,artist:t.artist,album:t.album,
      artwork: artUrl?[{src:artUrl,sizes:"512x512",type:"image/jpeg"}]:[]});
  }
}
function setArt(img,url){ if(url){ img.style.visibility="visible"; img.src=url; img.onerror=()=>img.style.visibility="hidden"; }
  else { img.removeAttribute("src"); img.style.visibility="hidden"; } }

function togglePlay(){
  if(!currentId()) return;
  if(S.playing){ S.playing=false; fade(cur(),0,FADE,()=>cur().pause()); }
  else { S.playing=true; const p=cur().play(); if(p&&p.catch)p.catch(()=>{}); fade(cur(),S.volume,FADE); }
  updatePlay(); markPlayingRow(currentId()); persist(); syncState();
}
function nextTrack(){ const id=peekNext(); if(id!=null) transitionTo(id,FADE); }
function prevTrack(){
  if(cur().currentTime>3){ cur().currentTime=0; return; }
  if(S.pos>0){ S.pos--; transitionTo(currentId(),FADE); }
  else if(S.repeat==="all"){ S.pos=S.order.length-1; transitionTo(currentId(),FADE); }
  else cur().currentTime=0;
}
function stopPlay(){ S.playing=false; fade(cur(),0,FADE,()=>cur().pause()); updatePlay(); markPlayingRow(null); persist(); }

function onTime(e){
  if(e.target!==cur()) return;
  const a=cur(); drawTimes();
  // count a play once it's actually been "heard"
  if(!S._counted && a.duration && a.currentTime>=Math.min(10,a.duration*0.5)) countPlay();
  // auto crossfade into next near the end
  if(S.crossfade>0 && !S._xfading && a.duration && a.currentTime>2){
    const remain=a.duration-a.currentTime;
    if(remain<=S.crossfade && !(S.sleep&&S.sleep.endOfTrack)){
      const savedPos=S.pos, savedOrder=S.order; const id=peekNext();
      if(id!=null){ S._xfading=true; transitionTo(id,S.crossfade); }
      else { S.pos=savedPos; S.order=savedOrder; }
    }
  }
}
function onEnded(e){
  if(e.target!==cur()) return;
  if(!S._counted) countPlay();
  if(S.sleep && S.sleep.endOfTrack){ stopPlay(); clearSleep(); return; }
  const id=peekNext();
  id==null ? stopPlay() : transitionTo(id,0);
}
function countPlay(){
  S._counted=true; const id=currentId(); if(id==null) return;
  fetch("api/play/"+id,{method:"POST"}).catch(()=>{});
  const t=tr(id); if(t){ t.playCount=(t.playCount||0)+1; t.lastPlayedAt=Date.now()/1000;
    if(S.view==="most"||S.view==="history") {/* refresh later */} }
}

// ---- UI sync ----
function drawTimes(){
  const a=cur(), id=currentId(); const t=id!=null?tr(id):null;
  const dur=isFinite(a.duration)&&a.duration?a.duration:(t?t.duration:0);
  const frac=dur?a.currentTime/dur:0;
  if(!S._seeking){ const sk=$("#seek"); sk.value=Math.round(frac*1000); sk.style.setProperty("--fill",(frac*100)+"%"); }
  $("#tCur").textContent=fmt(a.currentTime); $("#tDur").textContent=fmt(dur);
  $("#barFill").style.width=(frac*100)+"%";
}
function updatePlay(){
  const i=S.playing?"⏸":"▶";
  $("#barPlay").textContent=i; $("#npPlay").textContent=i;
  if("mediaSession" in navigator)
    navigator.mediaSession.playbackState=S.playing?"playing":"paused";
}

// ---- sleep timer ----
let sleepTick=null;
function renderSleep(){
  const body=$("#sleepBody"); body.innerHTML="";
  const opts=[["15 minutes",15],["30 minutes",30],["45 minutes",45],["1 hour",60],
              ["End of track","track"],["Off","off"]];
  opts.forEach(([label,val])=>{
    const o=el("div","sleep-opt");
    const active = S.sleep && ((val==="track"&&S.sleep.endOfTrack) ||
                   (typeof val==="number"&&S.sleep.mins===val));
    if(active) o.classList.add("on");
    o.innerHTML="<span>"+label+"</span>";
    const r=el("span"); r.id="sleepRemain";
    if(active && typeof val==="number") r.textContent=fmt((S.sleep.until-Date.now())/1000);
    o.appendChild(r);
    o.onclick=()=>setSleep(val); body.appendChild(o);
  });
}
function setSleep(val){
  clearSleep();
  if(val==="off"){ renderSleep(); toast("Sleep timer off"); return; }
  if(val==="track"){ S.sleep={endOfTrack:true}; renderSleep(); toast("Will stop after this track"); return; }
  S.sleep={mins:val, until:Date.now()+val*60000};
  sleepTick=setInterval(()=>{
    const left=S.sleep.until-Date.now();
    const r=$("#sleepRemain"); if(r) r.textContent=fmt(left/1000);
    if(left<=0){ fade(cur(),0,2,()=>cur().pause()); S.playing=false; updatePlay(); clearSleep(); toast("Paused — sleep timer"); }
  },1000);
  renderSleep(); toast("Sleeping in "+val+" min");
}
function clearSleep(){ if(sleepTick) clearInterval(sleepTick); sleepTick=null; S.sleep=null; }

let scrim=null;
function closeMenu(){ document.querySelectorAll(".menu").forEach(m=>m.remove()); if(scrim){scrim.remove();scrim=null;} }
function openMenu(anchor, id){
  closeMenu();
  scrim=el("div","scrim"); scrim.onclick=closeMenu; document.body.appendChild(scrim);
  const m=el("div","menu"); const t=tr(id);
  const add=(label,fn)=>{ const b=el("button"); b.textContent=label; b.onclick=()=>{fn();closeMenu();}; m.appendChild(b); };
  add("Play next",()=>playNext(id));
  add("Add to queue",()=>addQueue(id));
  add(t.liked?"Unlike":"Like",()=>toggleLike(id));
  const sep=el("div","sep"); m.appendChild(sep);
  const lbl=el("div","mlabel"); lbl.textContent="Add to playlist"; m.appendChild(lbl);
  S.playlists.filter(p=>!p.isSmart).forEach(p=>add(p.name,()=>addToPlaylist(p.id,id)));
  add("+ New playlist…",()=>newPlaylist(false,id));
  document.body.appendChild(m);
  const r=anchor.getBoundingClientRect();
  let top=r.bottom+6, left=Math.min(r.left, innerWidth-m.offsetWidth-10);
  if(top+m.offsetHeight>innerHeight-10) top=r.top-m.offsetHeight-6;
  m.style.top=Math.max(10,top)+"px"; m.style.left=Math.max(10,left)+"px";
}
function ensureQueue(){ if(!S.queue.length && currentId()==null){} }
function playNext(id){
  if(!S.queue.length){ S.queue=[id]; buildOrder(0); showPlayer(); transitionTo(id,FADE); return; }
  const insertReal=S.order[S.pos]+1;
  S.queue.splice(insertReal,0,id);
  S.order=S.order.map(v=>v>=insertReal?v+1:v);
  S.order.splice(S.pos+1,0,insertReal);
  renderQueue(); toast("Playing next"); syncState();
}
function addQueue(id){
  if(!S.queue.length){ S.queue=[id]; buildOrder(0); showPlayer(); transitionTo(id,FADE); return; }
  S.queue.push(id); S.order.push(S.queue.length-1); renderQueue(); toast("Added to queue"); syncState();
}
async function addToPlaylist(pid,tid){
  await fetch("api/playlists/"+pid+"/tracks",{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({trackId:tid})});
  await loadPlaylists(); toast("Added to playlist");
}

// ---- playlist create / smart builder ----
function modal(node){ const m=el("div","modal"); m.appendChild(node);
  m.onclick=e=>{ if(e.target===m) m.remove(); }; document.body.appendChild(m); return m; }
function newPlaylist(smart, addId){
  const card=el("div","card");
  card.innerHTML="<h3>"+(smart?"New smart playlist":"New playlist")+"</h3>";
  const f1=el("div","field"); f1.innerHTML='<label>Name</label>';
  const name=el("input"); name.placeholder=smart?"Recent favourites":"My playlist"; f1.appendChild(name); card.appendChild(f1);

  let conds=[];
  if(smart){
    const mf=el("div","field"); mf.innerHTML='<label>Match</label>';
    const match=el("select"); match.innerHTML='<option value="all">All rules</option><option value="any">Any rule</option>';
    mf.appendChild(match); card.appendChild(mf);
    const wrap=el("div"); card.appendChild(wrap);
    const addCond=()=>{
      const row=el("div","cond");
      const field=el("select"); field.innerHTML=
        '<option value="title">Title</option><option value="artist">Artist</option>'+
        '<option value="album">Album</option><option value="liked">Liked</option>'+
        '<option value="playCount">Play count</option>';
      const op=el("select"); const val=el("input"); val.placeholder="value";
      const syncOps=()=>{ const f=field.value;
        op.innerHTML = f==="liked" ? '<option value="true">is liked</option><option value="false">not liked</option>'
          : f==="playCount" ? '<option value="gte">at least</option><option value="lte">at most</option>'
          : '<option value="contains">contains</option><option value="is">is</option><option value="isNot">is not</option>';
        val.style.display = f==="liked" ? "none":"block"; };
      field.onchange=syncOps; syncOps();
      const rm=el("button","rm"); rm.textContent="−"; rm.onclick=()=>{ row.remove(); conds=conds.filter(c=>c.row!==row); };
      row.append(field,op,val,rm); wrap.appendChild(row);
      conds.push({row,field,op,val});
    };
    addCond();
    const more=el("button","btn"); more.textContent="+ Add rule"; more.style.marginTop="2px"; more.onclick=addCond;
    card.appendChild(more);
    card._collect=()=>({match:match.value, conditions:conds.map(c=>({field:c.field.value,op:c.op.value,value:c.val.value}))});
  }
  const foot=el("div","card-foot");
  const cancel=el("button","btn"); cancel.textContent="Cancel";
  const save=el("button","btn accent"); save.textContent="Create";
  foot.append(cancel,save); card.appendChild(foot);
  const m=modal(card); cancel.onclick=()=>m.remove(); name.focus();
  save.onclick=async ()=>{
    const body={name:name.value||"Untitled", isSmart:smart};
    if(smart) body.rules=card._collect();
    const r=await fetch("api/playlists",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
    const {id}=await r.json(); await loadPlaylists();
    if(addId) await addToPlaylist(id, addId);
    m.remove(); if(S.view==="playlists"||S.view==="playlist") render(); toast("Playlist created");
  };
}
function playlistMenu(e,p){
  closeMenu(); scrim=el("div","scrim"); scrim.onclick=closeMenu; document.body.appendChild(scrim);
  const m=el("div","menu");
  const add=(l,fn)=>{ const b=el("button"); b.textContent=l; b.onclick=()=>{fn();closeMenu();}; m.appendChild(b); };
  add("Play",()=>{ S.openPlaylist=p; S.view="playlist"; const ids=viewIds(); if(ids.length) playFrom(ids,0); render(); });
  add("Rename",()=>renamePlaylist(p));
  add("Delete",async()=>{ await fetch("api/playlists/"+p.id,{method:"DELETE"}); await loadPlaylists();
    if(S.openPlaylist&&S.openPlaylist.id===p.id) S.openPlaylist=null; render(); });
  document.body.appendChild(m);
  m.style.top=e.clientY+"px"; m.style.left=Math.min(e.clientX,innerWidth-210)+"px";
}
function renamePlaylist(p){
  const card=el("div","card"); card.innerHTML="<h3>Rename playlist</h3>";
  const inp=el("input"); inp.value=p.name; card.appendChild(inp);
  const foot=el("div","card-foot"); const c=el("button","btn"); c.textContent="Cancel";
  const s=el("button","btn accent"); s.textContent="Save"; foot.append(c,s); card.appendChild(foot);
  const m=modal(card); inp.focus(); c.onclick=()=>m.remove();
  s.onclick=async()=>{ await fetch("api/playlists/"+p.id,{method:"PUT",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({name:inp.value})}); await loadPlaylists(); m.remove(); render(); };
}

// ---- scan ----
const scanBtn=$("#scanBtn");
async function doScan(){
  const r=await fetch("api/scan",{method:"POST"});
  if(r.status===409){ toast("Already scanning…"); }
  scanBtn.disabled=true;
  const poll=setInterval(async()=>{
    const s=await (await fetch("api/scan/status")).json();
    scanBtn.textContent = s.total ? "Scanning "+s.scanned+"/"+s.total : "Scanning…";
    if(!s.running){
      clearInterval(poll); scanBtn.disabled=false; scanBtn.textContent="Scan";
      if(s.error){ toast("Scan failed: "+s.error); return; }
      await loadTracks(); await loadPlaylists();
      toast("Added "+s.added+" · Updated "+s.updated+(s.removed?" · Removed "+s.removed:""));
    }
  },600);
}
scanBtn.onclick=doScan;

// ---- search ----
let st=null;
$("#search").addEventListener("input",e=>{ clearTimeout(st);
  st=setTimeout(()=>{ S.search=e.target.value; render(); listEl.scrollTop=0; },120); });

// ---- history ----
async function loadHistory(){
  const arr=await (await fetch("api/history?limit=200")).json();
  // ensure tracks exist locally
  arr.forEach(t=>{ if(!S.byId.has(t.id)) S.byId.set(t.id,t); });
  S.historyIds=arr.map(t=>t.id);
}

// ---- media session controls ----
if("mediaSession" in navigator){
  const ms=navigator.mediaSession;
  ms.setActionHandler("play",togglePlay); ms.setActionHandler("pause",togglePlay);
  ms.setActionHandler("previoustrack",prevTrack); ms.setActionHandler("nexttrack",nextTrack);
  try{ ms.setActionHandler("seekto",d=>{ if(d.seekTime!=null) cur().currentTime=d.seekTime; }); }catch(e){}
}

// ---- keyboard (PC / some TV remotes) ----
addEventListener("keydown",e=>{
  if(e.target.tagName==="INPUT") return;
  if(e.code==="Space"){ e.preventDefault(); togglePlay(); }
  else if(e.code==="ArrowRight" && e.shiftKey) nextTrack();
  else if(e.code==="ArrowLeft" && e.shiftKey) prevTrack();
  else if(e.code==="ArrowRight"){ cur().currentTime=Math.min((cur().duration||0),cur().currentTime+10); }
  else if(e.code==="ArrowLeft"){ cur().currentTime=Math.max(0,cur().currentTime-10); }
  else if(e.code==="Escape") collapse();
});

// ---- persistence (per device) ----
let pT=null;
function persist(){ clearTimeout(pT); pT=setTimeout(()=>{
  try{ localStorage.setItem("player", JSON.stringify({
    id:currentId(), time:cur().currentTime, queue:S.queue, pos:S.pos, order:S.order,
    shuffle:S.shuffle, repeat:S.repeat, volume:S.volume, crossfade:S.crossfade })); }catch(e){}
},400); }
function restore(){
  let d; try{ d=JSON.parse(localStorage.getItem("player")||"null"); }catch(e){}
  if(!d) return;
  S.volume=d.volume??0.9; S.crossfade=d.crossfade??4; S.shuffle=!!d.shuffle; S.repeat=d.repeat||"off";
  vol.value=Math.round(S.volume*100); vol.style.setProperty("--fill",(S.volume*100)+"%");
  barVol.value=vol.value; barVol.style.setProperty("--fill",(S.volume*100)+"%");
  xfadeEl.value=S.crossfade; xfadeEl.style.setProperty("--fill",(S.crossfade/30*100)+"%"); syncXfadeLabel();
  $("#shuffle").classList.toggle("on",S.shuffle);
  if(S.repeat!=="off"){ $("#repeat").classList.add("on"); $("#repeat").textContent=S.repeat==="one"?"↻¹":"↻"; }
  aud.forEach(a=>a.volume=S.volume);
  if(d.id!=null && S.byId.has(d.id) && Array.isArray(d.queue) && d.queue.length){
    S.queue=d.queue; S.order=d.order&&d.order.length===d.queue.length?d.order:[...d.queue.keys()];
    S.pos=d.pos||0; showPlayer();
    // cue the last track paused at saved position; play resumes on user gesture
    cur().src="api/stream/"+d.id; cur().volume=S.volume;
    cur().addEventListener("loadedmetadata",function once(){ cur().currentTime=d.time||0;
      cur().removeEventListener("loadedmetadata",once); drawTimes(); },{once:true});
    S.playing=false; onTrackChanged(d.id); updatePlay();
  }
}

// ---- toast ----
let toastT=null;
function toast(msg){ const t=$("#toast"); t.textContent=msg; t.classList.add("show");
  clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove("show"),2200); }

addEventListener("scroll",closeMenu,true);

// ---- cross-device sync ----
const CLIENT_ID=Math.random().toString(36).slice(2,10);
let _applyingSync=false, _syncT=null;
function syncState(){
  if(_applyingSync) return;
  clearTimeout(_syncT);
  _syncT=setTimeout(()=>{
    const id=currentId(); if(id==null) return;
    fetch("api/sync",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({clientId:CLIENT_ID,id,playing:S.playing,
        queue:S.queue,order:S.order,pos:S.pos,shuffle:S.shuffle,repeat:S.repeat})
    }).catch(()=>{});
  },300);
}
function applySync(d){
  if(!d||d.clientId===CLIENT_ID) return;
  _applyingSync=true;
  try{
    const prevId=currentId();
    if(Array.isArray(d.queue)) S.queue=d.queue;
    if(Array.isArray(d.order)) S.order=d.order;
    if(typeof d.pos==="number") S.pos=d.pos;
    if(typeof d.shuffle==="boolean"&&d.shuffle!==S.shuffle){
      S.shuffle=d.shuffle; $("#shuffle").classList.toggle("on",S.shuffle);
    }
    if(d.repeat&&d.repeat!==S.repeat){
      S.repeat=d.repeat; const rb=$("#repeat");
      rb.classList.toggle("on",S.repeat!=="off");
      rb.textContent=S.repeat==="one"?"↻¹":"↻"; rb.title="Repeat: "+S.repeat;
    }
    if(d.id!=null&&S.byId.has(d.id)){
      if(d.id!==prevId){
        S.playing=false; cur().pause();
        cur().src="api/stream/"+d.id; cur().volume=S.volume;
        showPlayer(); onTrackChanged(d.id);
        if(d.playing){ S.playing=true; const p=cur().play(); if(p&&p.catch)p.catch(()=>{}); }
        updatePlay(); markPlayingRow(d.id);
      } else if(d.playing!==S.playing){
        if(d.playing){ S.playing=true; cur().volume=S.volume; cur().play().catch(()=>{}); }
        else { S.playing=false; cur().pause(); }
        updatePlay(); markPlayingRow(d.id);
      }
    }
    renderQueue();
  }finally{ _applyingSync=false; }
}
function connectSync(){
  const es=new EventSource("api/sync/events");
  es.onmessage=e=>{ if(e.data==="connected"||e.data.startsWith(":")) return;
    try{ applySync(JSON.parse(e.data)); }catch(ex){} };
  es.onerror=()=>{ es.close(); setTimeout(connectSync,4000); };
}
connectSync();

// ---- boot ----
(async()=>{ await loadTracks(); await loadPlaylists(); restore(); })();
})();
